<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student HUB | Logout</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:linear-gradient(to right,#0A4D9C,#4A90E2);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.logout-box{
    width:500px;
    background:white;
    text-align:center;
    padding:40px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

.logout-box h1{
    color:#0A4D9C;
    margin-bottom:20px;
}

.logout-box p{
    color:#555;
    font-size:18px;
    margin-bottom:30px;
    line-height:1.6;
}

.icon{
    font-size:70px;
    margin-bottom:20px;
}

.btn{
    display:inline-block;
    text-decoration:none;
    background:#0A4D9C;
    color:white;
    padding:12px 25px;
    margin:10px;
    border-radius:8px;
    font-size:18px;
    font-weight:bold;
}

.btn:hover{
    background:#083b75;
}

</style>

</head>

<body>

<div class="logout-box">

<div class="icon">👋</div>

<h1>You Have Logged Out</h1>

<p>
Thank you for using <b>Student HUB</b>.<br>
You have successfully logged out of your account.
</p>

<a href="login.html" class="btn">Login Again</a>

<a href="home.html" class="btn">Home Page</a>

</div>

</body>
</html>
