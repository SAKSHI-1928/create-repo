<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student HUB - Login</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#E3F2FD;
}

/* Header */

header{
    background:#1565C0;
    color:white;
    text-align:center;
    padding:20px;
}

header h1{
    font-size:40px;
}

/* Navigation */

nav{
    background:#0D47A1;
    display:flex;
    justify-content:flex-end;
    gap:30px;
    padding:18px 40px;
}

nav a{
    color:white;
    text-decoration:none;
    font-size:22px;
    font-weight:bold;
}

nav a:hover{
    color:yellow;
}

/* Login Box */

.container{
    width:400px;
    background:white;
    margin:60px auto;
    padding:35px;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

.container h2{
    text-align:center;
    color:#1565C0;
    margin-bottom:30px;
    font-size:32px;
}

label{
    display:block;
    margin-top:15px;
    font-weight:bold;
    color:#333;
}

input{
    width:100%;
    padding:12px;
    margin-top:8px;
    border:1px solid #ccc;
    border-radius:6px;
    font-size:16px;
}

.options{
    display:flex;
    justify-content:space-between;
    margin-top:15px;
    font-size:15px;
}

.options a{
    text-decoration:none;
    color:#1565C0;
    font-weight:bold;
}

.options a:hover{
    text-decoration:underline;
}

button{
    width:100%;
    margin-top:25px;
    padding:12px;
    background:#1565C0;
    color:white;
    border:none;
    border-radius:6px;
    font-size:20px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#0D47A1;
}

.register{
    text-align:center;
    margin-top:20px;
}

.register a{
    color:#1565C0;
    font-weight:bold;
    text-decoration:none;
}

.register a:hover{
    text-decoration:underline;
}

/* Footer */

footer{
    margin-top:60px;
    background:#1565C0;
    color:white;
    text-align:center;
    padding:20px;
}

</style>

</head>

<body>

<header>
<h1>Student HUB Portal</h1>
</header>

<nav>
<a href="index.html">Home</a>
<a href="dashboard.html">Dashboard</a>
<a href="about.html">About</a>
<a href="contact.html">Contact</a>
<a href="profile.html">Profile</a>
</nav>

<div class="container">

<h2>Student Login</h2>

<form>

<label>Email Address</label>
<input type="email" placeholder="Enter your email" required>

<label>Password</label>
<input type="password" placeholder="Enter your password" required>

<div class="options">
<label>
<input type="checkbox"> Remember Me
</label>

<a href="#">Forgot Password?</a>
</div>

<button type="submit">Login</button>

<div class="register">
<p>Don't have an account?
<a href="register.html">Register Here</a></p>
</div>

</form>

</div>

<footer>
<p>© 2026 Student HUB Portal | Designed by Sakshi Gadhiya</p>
</footer>

</body>
</html>
